# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Service connection for Azure Container Registry (set in Azure DevOps UI)
  dockerRegistryServiceConnection: $(DOCKER_REGISTRY_SERVICE_CONNECTION)
  # Name of the image repository
  imageRepository: $(IMAGE_REPOSITORY)
  # Container registry URL
  containerRegistry: $(CONTAINER_REGISTRY)
  # Path to the Dockerfile (corrected path)
  dockerfilePath: $(Build.SourcesDirectory)/src/Dockerfile
  # Tag for the image
  tag: $(IMAGE_TAG)

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
- stage: Test
  displayName: Run tests
  dependsOn: Build
  condition: succeeded('Build')
  jobs:
  - job: Test
    displayName: Run unit and integration tests
    variables:
      CI: 'true'
      AZURE_PIPELINE: 'true'
      NODE_OPTIONS: '--max-old-space-size=4096'
      TEST_TIMEOUT: '60000'
    pool:
      vmImage: $(vmImageName)
    steps:
    - script: |
        npm ci
        npm run test
      displayName: Run backend tests
      workingDirectory: src/react-backend
    - script: |
        npm ci
        npm run test
      displayName: Run frontend tests
      workingDirectory: src/react-frontend
    - script: |
        npm run build
        npx serve -s dist -l 5173 &
        sleep 5
        npm run selenium-test
      displayName: Build, serve, and run Selenium E2E tests
      workingDirectory: src/react-frontend
    - script: |
        CHROME_VERSION=$(google-chrome --version | grep -oE '[0-9]+' | head -1)
        echo "Detected Chrome version: $CHROME_VERSION"
        wget -O chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION.0.0/linux64/chromedriver-linux64.zip"
        unzip -o chromedriver.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        chromedriver --version
      displayName: Install matching ChromeDriver

- stage: DeployDev
  displayName: Deploy to thecycle-dev slot
  dependsOn: [Build, Test]
  condition: succeeded('Test')
  jobs:
  - job: DeployDev
    displayName: Deploy to thecycle-dev slot
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy to thecycle-dev slot
      inputs:
        azureSubscription: $(AZURE_SUBSCRIPTION)
        appName: TheCycle
        slotName: dev
        imageName: $(containerRegistry)/$(imageRepository):$(tag)

- stage: DeployProd
  displayName: Deploy to production slot
  dependsOn: DeployDev
  condition: and(succeeded('DeployDev'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProd
    displayName: Deploy to production slot
    environment: production
    # Manual approval can be configured in Azure DevOps for this environment
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy to production slot
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              appName: TheCycle
              imageName: $(containerRegistry)/$(imageRepository):$(tag)
